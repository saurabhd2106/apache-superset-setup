services:
  db:
    image: postgres:latest
    container_name: superset-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - superset-net

  superset-init:
    image: apache/superset:latest
    container_name: superset-init
    restart: "no"
    env_file:
      - .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      PYTHONPATH: /app/pythonpath:/app/superset_home/.local/lib/python3.10/site-packages
    depends_on:
      db:
        condition: service_healthy
    command: >
      /bin/sh -c "
      pip install --no-cache-dir psycopg2-binary &&
      superset db upgrade &&
      superset fab create-admin
      --username ${SUPERSET_ADMIN_USERNAME}
      --firstname Superset
      --lastname Admin
      --email ${SUPERSET_ADMIN_EMAIL}
      --password ${SUPERSET_ADMIN_PASSWORD}
      || true &&
      superset init
      "
    networks:
      - superset-net
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro

  superset:
    image: apache/superset:latest
    container_name: superset
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      PYTHONPATH: /app/pythonpath:/app/superset_home/.local/lib/python3.10/site-packages
    depends_on:
      db:
        condition: service_healthy
      superset-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8088:8088"
    command: >
      /bin/sh -c "pip install --no-cache-dir psycopg2-binary && superset run -h 0.0.0.0 -p 8088"
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    networks:
      - superset-net

  sql-client:
    image: adminer:latest
    container_name: superset-adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    networks:
      - superset-net

volumes:
  postgres_data:
  superset_home:

networks:
  superset-net:
    driver: bridge
